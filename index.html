<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <button id="add" class="btn">ADD</button>
  <button id="clear" class="btn">CLEAR</button>
</div>
<div id="selector" class="hidden">
  <button class="btn" data-type="fish">FISH</button>
  <button class="btn" data-type="crab">CRAB</button>
  <button class="btn" data-type="snail">SNAIL</button>
  <button class="btn" data-type="turtle">TURTLE</button>
  <button class="btn" data-type="plant-short">SHORT PLANT</button>
  <button class="btn" data-type="plant-medium">MED PLANT</button>
  <button class="btn" data-type="plant-tall">TALL PLANT</button>
  <button class="btn" data-type="rock-short">SM ROCK</button>
  <button class="btn" data-type="rock-medium">MD ROCK</button>
  <button class="btn" data-type="rock-tall">LG ROCK</button>
</div>
<script src="src/js/behaviors/cursor.js"></script>
<script src="src/js/behaviors/panic.js"></script>
<script src="src/js/behaviors/feeding.js"></script>
<script src="src/js/behaviors/nudge.js"></script>
<script src="src/js/behaviors/surface.js"></script>
<script src="src/js/entities/crab.js"></script>
<script src="src/js/entities/flake.js"></script>
<script src="src/js/entities/rock.js"></script>
<script src="src/js/entities/plant.js"></script>
<script src="src/js/entities/turtle.js"></script>
<script src="src/js/entities/snail.js"></script>
<script src="src/js/entities/fish.js"></script>
<script src="src/js/game.js"></script>
</body>
</html>
