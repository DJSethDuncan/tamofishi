<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
<div id="app-wrap">
<div id="tank-wrap">
  <canvas id="c"></canvas>
  <button id="settings-btn" class="btn btn-settings"><canvas id="gear-icon" width="7" height="7"></canvas></button>
  <div id="settings-modal" class="hidden">
    <div id="settings-panel">
      <button id="murder-btn" class="btn btn-modal">MURDER</button>
      <button id="clear" class="btn btn-modal">CLEAR TANK</button>
      <button id="settings-close" class="btn btn-modal">CLOSE</button>
    </div>
  </div>
</div>
<div id="controls">
  <button id="add" class="btn">ADD</button>
</div>
<div id="selector" class="hidden">
  <button class="btn" data-type="fish"><canvas class="icon" data-icon="fish"></canvas> FISH</button>
  <button class="btn" data-type="crab"><canvas class="icon" data-icon="crab"></canvas> CRAB</button>
  <button class="btn" data-type="snail"><canvas class="icon" data-icon="snail"></canvas> SNAIL</button>
  <button class="btn" data-type="turtle"><canvas class="icon" data-icon="turtle"></canvas> TURTLE</button>
  <button class="btn" data-type="shrimp"><canvas class="icon" data-icon="shrimp"></canvas> SHRIMP</button>
  <button class="btn" data-type="duckweed"><canvas class="icon" data-icon="duckweed"></canvas> DUCKWEED</button>
  <button class="btn" data-sizes="plant"><canvas class="icon" data-icon="plant"></canvas> PLANT</button>
  <button class="btn" data-sizes="rock"><canvas class="icon" data-icon="rock"></canvas> ROCK</button>
</div>
<div id="sizer" class="hidden">
  <button class="btn" data-size="short">SMALL</button>
  <button class="btn" data-size="medium">MEDIUM</button>
  <button class="btn" data-size="tall">LARGE</button>
</div>
</div>
<script src="src/js/favicon.js"></script>
<script src="src/js/storage.js"></script>
<script src="src/js/layout.js"></script>
<script src="src/js/behaviors/cursor.js"></script>
<script src="src/js/behaviors/panic.js"></script>
<script src="src/js/behaviors/feeding.js"></script>
<script src="src/js/behaviors/nudge.js"></script>
<script src="src/js/behaviors/surface.js"></script>
<script src="src/js/entities/crab.js"></script>
<script src="src/js/entities/flake.js"></script>
<script src="src/js/entities/rock.js"></script>
<script src="src/js/entities/plant.js"></script>
<script src="src/js/entities/turtle.js"></script>
<script src="src/js/entities/shrimp.js"></script>
<script src="src/js/entities/snail.js"></script>
<script src="src/js/entities/duckweed.js"></script>
<script src="src/js/entities/fish.js"></script>
<script src="src/js/game.js"></script>
</body>
</html>
